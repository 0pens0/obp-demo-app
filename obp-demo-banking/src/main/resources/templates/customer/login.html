<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - OBP Demo Banking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>Customer Login</h1>
            <p class="subtitle">OBP Demo Banking Application</p>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="@{/customer/authenticate}" th:object="${loginRequest}" method="post">
                <div th:if="${#fields.hasErrors('*')}" class="alert alert-error">
                    <span th:each="err : ${#fields.errors('*')}" th:text="${err}"></span>
                </div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" required 
                           placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" required 
                           placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <p class="note">Use credentials created by admin</p>
        </div>
    </div>
</body>
</html>
